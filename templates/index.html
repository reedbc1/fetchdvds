<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WR Semantic Search</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="page-home">
  <main class="landing-page">
    <section id="big-one" class="hero">
      <p class="eyebrow">Search your collection</p>
      <h1 id="title" class="hero-title">WR Semantic Search</h1>
      <p class="hero-subtitle">
        Explore titles, authors, and topics with search based on meaning.
      </p>

      <form class="search-form" action="/search" method="get">
        <label class="sr-only" for="search">Search the catalog</label>
        <div class="search-container">
          <input
            type="text"
            id="search"
            name="query"
            placeholder="Search books, authors, or subjects"
            autocomplete="off"
          >
          <input type="submit" id="submit" value="Search">
        </div>
      </form>
    </section>
  </main>
</body>
</html>
